apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-app
  namespace: argocd
spec:
  project: nginx-project

  source:
    repoURL: https://github.com/aje35hk/test.git
    targetRevision: HEAD
    path: nginx-chart

    helm:
      releaseName: nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true